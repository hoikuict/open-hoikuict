{% if documents %}
  <div class="document-list">
    {% for document in documents %}
      <a class="document-row" href="/plans/documents/{{ document.id }}">
        <span class="document-row__type">{{ document.document_type_label }}</span>
        <span class="document-row__main">
          <strong>{{ document.title }}</strong>
          <small>クラス: {{ document.classroom_label }} / 作成者: {{ document.owner_name }}</small>
        </span>
        <span class="status status--{{ document.status.value }}">{{ document.status_label }}</span>
      </a>
    {% endfor %}
  </div>
{% else %}
  <div class="empty-state">
    <strong>まだ帳票がありません。</strong>
    <span>年案または月案の作成から始められます。</span>
  </div>
{% endif %}
