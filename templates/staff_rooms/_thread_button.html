<button
  id="thread-toggle-{{ parent_message.id }}"
  type="button"
  hx-get="/staff-rooms/threads/{{ parent_message.id }}"
  hx-target="#thread-panel"
  hx-swap="innerHTML"
  {% if oob_reply_count is defined and oob_reply_count %}hx-swap-oob="outerHTML"{% endif %}
  class="rounded-full border border-indigo-300 px-3 py-1.5 text-xs font-medium text-indigo-700 hover:bg-indigo-50"
>
  返信 {{ reply_count }}件
</button>
