<section class="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm">
  <header class="mb-4">
    <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-500">日表示</p>
    <h2 class="text-2xl font-semibold text-slate-900">{{ day_title }}</h2>
  </header>

  <div class="space-y-3">
    <div>
      <p class="mb-2 text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">終日</p>
      <div class="space-y-2">
        {% for item in day_map[anchor] if item.is_all_day %}
        <button
          hx-get="/events/{{ item.source_event_id }}?original_start_at={{ item.original_start_at }}&mode={{ mode }}&date={{ anchor.isoformat() }}"
          hx-target="#event-modal"
          hx-swap="innerHTML"
          class="w-full rounded-2xl px-3 py-2 text-left text-sm font-medium text-white"
          style="background-color: {{ item.color }};"
        >
          {{ item.title }}
        </button>
        {% endfor %}
      </div>
    </div>

    {% for hour in hours %}
    <div class="rounded-2xl border border-slate-200 p-4">
      <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">{{ "%02d:00"|format(hour) }}</p>
      <div class="mt-3 space-y-2">
        {% for item in day_map[anchor] if (not item.is_all_day) and item.local_start.hour == hour %}
        <button
          hx-get="/events/{{ item.source_event_id }}?original_start_at={{ item.original_start_at }}&mode={{ mode }}&date={{ anchor.isoformat() }}"
          hx-target="#event-modal"
          hx-swap="innerHTML"
          class="w-full rounded-2xl px-3 py-3 text-left text-sm font-medium text-white"
          style="background-color: {{ item.color }};"
        >
          <div>{{ item.title }}</div>
          <div class="opacity-80">{{ item.time_label }}</div>
        </button>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</section>
