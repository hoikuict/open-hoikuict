{% extends "base.html" %}
{% block title %}園児一覧 | open-hoikuict{% endblock %}

{% block content %}
<div class="mb-4 flex items-center justify-between">
  <div>
    <h1 class="text-2xl font-bold text-slate-800">園児一覧</h1>
    <p class="text-sm text-slate-500">家族単位で紐づいた園児情報を確認できます。</p>
  </div>
  <div class="flex gap-2">
    {% if current_user and current_user.can_edit %}
    <a href="/children/new" class="rounded bg-indigo-600 px-4 py-2 text-sm text-white hover:bg-indigo-700">園児を追加</a>
    {% endif %}
    <button onclick="window.print()" class="no-print rounded border border-slate-300 bg-white px-4 py-2 text-sm text-slate-600 hover:bg-slate-100">印刷</button>
  </div>
</div>

<div class="no-print mb-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
  <form id="filter-form" hx-get="/children/table" hx-target="#table-area" hx-trigger="change" hx-include="#filter-form">
    <div class="mb-3 flex flex-wrap items-center gap-4">
      <span class="w-20 text-sm font-medium text-slate-600">在籍状況</span>
      <label class="flex items-center gap-1 text-sm"><input type="radio" name="status" value="enrolled" {% if current_status == 'enrolled' %}checked{% endif %}>在園</label>
      <label class="flex items-center gap-1 text-sm"><input type="radio" name="status" value="all" {% if current_status == 'all' %}checked{% endif %}>すべて</label>
      <label class="flex items-center gap-1 text-sm"><input type="radio" name="status" value="graduated" {% if current_status == 'graduated' %}checked{% endif %}>卒園</label>
      <label class="flex items-center gap-1 text-sm"><input type="radio" name="status" value="withdrawn" {% if current_status == 'withdrawn' %}checked{% endif %}>退園</label>
    </div>

    <div class="flex items-start gap-4">
      <span class="mt-0.5 w-20 text-sm font-medium text-slate-600">表示項目</span>
      <div class="flex flex-wrap gap-x-4 gap-y-1.5">
        {% for field in all_fields %}
        <label class="flex items-center gap-1 text-sm">
          <input type="checkbox" name="fields" value="{{ field.key }}" {% if field.key in selected_fields %}checked{% endif %}>
          {{ field.label }}
        </label>
        {% endfor %}
      </div>
    </div>
  </form>
</div>

<div id="table-area">
  {% include "children/_table.html" %}
</div>
{% endblock %}
