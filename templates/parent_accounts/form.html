{% extends "base.html" %}
{% block title %}保護者アカウント編集 | open-hoikuict{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
  <div class="mb-5 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-slate-800">{{ submit_label }}</h1>
      <p class="text-sm text-slate-500">保護者アカウントを家族単位で紐づけます。</p>
    </div>
    <a href="/parent-accounts/" class="text-sm text-indigo-600 hover:underline">一覧へ戻る</a>
  </div>

  <form method="post" action="{{ action_url }}" class="space-y-6 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
    <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-600">表示名</label>
        <input type="text" name="display_name" required value="{{ account.display_name if account else '' }}" class="w-full rounded border border-slate-300 px-3 py-2">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-600">メールアドレス</label>
        <input type="email" name="email" required value="{{ account.email if account else '' }}" class="w-full rounded border border-slate-300 px-3 py-2">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-600">電話番号</label>
        <input type="text" name="phone" value="{{ account.phone if account and account.phone else '' }}" class="w-full rounded border border-slate-300 px-3 py-2">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-600">現住所</label>
        <input type="text" name="home_address" value="{{ account.home_address if account and account.home_address else '' }}" class="w-full rounded border border-slate-300 px-3 py-2">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-600">勤務先</label>
        <input type="text" name="workplace" value="{{ account.workplace if account and account.workplace else '' }}" class="w-full rounded border border-slate-300 px-3 py-2">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-600">勤務先電話番号</label>
        <input type="text" name="workplace_phone" value="{{ account.workplace_phone if account and account.workplace_phone else '' }}" class="w-full rounded border border-slate-300 px-3 py-2">
      </div>
      <div class="md:col-span-2">
        <label class="mb-1 block text-sm font-medium text-slate-600">勤務先住所</label>
        <input type="text" name="workplace_address" value="{{ account.workplace_address if account and account.workplace_address else '' }}" class="w-full rounded border border-slate-300 px-3 py-2">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-600">状態</label>
        <select name="status" class="w-full rounded border border-slate-300 px-3 py-2">
          {% for option in status_options %}
          <option value="{{ option.value }}" {% if (account and account.status.value == option.value) or (not account and option.value == 'active') %}selected{% endif %}>{{ option.label }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-600">所属家族</label>
        <select name="family_id" class="w-full rounded border border-slate-300 px-3 py-2">
          <option value="">未設定</option>
          {% for family in families %}
          <option value="{{ family.id }}" {% if selected_family_id == family.id %}selected{% endif %}>
            {{ family.family_name }}{% if family.children %} / {{ family.children|map(attribute='full_name')|join('、') }}{% endif %}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="flex gap-3">
      <button type="submit" class="rounded bg-indigo-600 px-4 py-2 text-white hover:bg-indigo-700">{{ submit_label }}</button>
      <a href="/parent-accounts/" class="rounded border border-slate-300 px-4 py-2 hover:bg-slate-50">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
