{% extends "base.html" %}
{% block title %}プロフィール編集 | open-hoikuict{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
  <div class="mb-5 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">プロフィール編集</h1>
      <p class="text-sm text-gray-500">連絡先や勤務先を変更すると、園側に変更通知が表示されます。</p>
    </div>
    <a href="/parent-portal/" class="text-sm text-indigo-600 hover:underline">ホームへ戻る</a>
  </div>

  {% if notice %}
  <div class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">{{ notice }}</div>
  {% endif %}
  {% if form_error %}
  <div class="mb-4 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">{{ form_error }}</div>
  {% endif %}

  <form method="post" action="/parent-portal/profile" class="space-y-6 rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
    <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-600">メールアドレス</label>
        <input type="email" name="email" required value="{{ form_data.email if form_data else current_parent_user.email }}"
               class="w-full rounded border border-gray-300 px-3 py-2">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-600">電話番号</label>
        <input type="text" name="phone" value="{{ form_data.phone if form_data else (current_parent_user.phone or '') }}"
               class="w-full rounded border border-gray-300 px-3 py-2">
      </div>
      <div class="md:col-span-2">
        <label class="mb-1 block text-sm font-medium text-gray-600">現住所</label>
        <input type="text" name="home_address" value="{{ form_data.home_address if form_data else (current_parent_user.home_address or '') }}"
               class="w-full rounded border border-gray-300 px-3 py-2">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-600">勤務先</label>
        <input type="text" name="workplace" value="{{ form_data.workplace if form_data else (current_parent_user.workplace or '') }}"
               class="w-full rounded border border-gray-300 px-3 py-2">
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-600">勤務先電話番号</label>
        <input type="text" name="workplace_phone" value="{{ form_data.workplace_phone if form_data else (current_parent_user.workplace_phone or '') }}"
               class="w-full rounded border border-gray-300 px-3 py-2">
      </div>
      <div class="md:col-span-2">
        <label class="mb-1 block text-sm font-medium text-gray-600">勤務先住所</label>
        <input type="text" name="workplace_address" value="{{ form_data.workplace_address if form_data else (current_parent_user.workplace_address or '') }}"
               class="w-full rounded border border-gray-300 px-3 py-2">
      </div>
    </div>

    <div class="flex gap-3">
      <button type="submit" class="rounded bg-indigo-600 px-4 py-2 text-white hover:bg-indigo-700">変更を保存</button>
      <a href="/parent-portal/" class="rounded border border-gray-300 px-4 py-2 hover:bg-gray-50">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
