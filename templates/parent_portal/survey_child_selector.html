{% extends "base.html" %}
{% block title %}園児選択 | open-hoikuict{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl">
  <div class="mb-6">
    <a href="/parent-portal/surveys" class="text-sm text-indigo-600 hover:underline">アンケート一覧へ戻る</a>
    <h1 class="mt-3 text-2xl font-bold text-gray-800">{{ survey.title }}</h1>
    <p class="mt-2 text-sm text-gray-500">回答する園児を選択してください。</p>
  </div>

  <div class="space-y-3">
    {% for child in children %}
    <a href="/parent-portal/surveys/{{ survey.id }}?child_id={{ child.id }}" class="block rounded-xl border border-gray-200 bg-white p-5 shadow-sm hover:border-indigo-300">
      <p class="font-semibold text-gray-800">{{ child.full_name }}</p>
      <p class="text-sm text-gray-500">{{ child.classroom.name if child.classroom else "クラス未設定" }}</p>
    </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
